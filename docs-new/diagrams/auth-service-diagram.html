<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Auth Service — JWT authentication, registration, login, password hashing, MariaDB. Vietnamese.">
<title>Auth Service — Architecture</title>
<script>
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<style>
  :root {
    --bg: #FAF9F5; --surface: #FFFFFF; --surface2: #F0EEE6;
    --ink: #141413; --body: #3D3D3A; --muted: #87867F;
    --line: #D1CFC5; --line-soft: #E6E3DA;
    --clay: #D97757; --clay-soft: rgba(217,119,87,0.10);
    --olive: #788C5D; --olive-soft: rgba(120,140,93,0.12);
    --gold: #C9A45C; --blue: #5B7E96;
    --zone: rgba(20,20,19,0.025); --zone-line: #D1CFC5;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  html.dark {
    --bg: #141413; --surface: #1F1F1D; --surface2: #2A2A28;
    --ink: #FAF9F5; --body: #D1CFC5; --muted: #87867F;
    --line: #3D3D3A; --line-soft: #2A2A28;
    --clay: #E48A6E; --clay-soft: rgba(228,138,110,0.14);
    --olive: #9DB07C; --olive-soft: rgba(157,176,124,0.16);
    --gold: #D4B36F; --blue: #7FA3BC;
    --zone: rgba(250,249,245,0.03); --zone-line: #3D3D3A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--body); font-family: var(--sans);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── top bar ─────────────────────────────── */
  .bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--line-soft); flex: none;
  }
  .bar h1 { font-family: var(--serif); font-weight: 500; font-size: 19px; color: var(--ink); letter-spacing: -0.01em; }
  .bar .sub { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .spacer { flex: 1; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s ease;
  }
  .chip:hover { color: var(--ink); border-color: var(--muted); }
  .chip.on { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  #themeToggle {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: transparent; color: var(--muted); cursor: pointer;
  }
  #themeToggle:hover { color: var(--ink); border-color: var(--muted); }

  /* ── stage ───────────────────────────────── */
  .stage { flex: 1; position: relative; min-height: 0; }

  /* canvas container (zoom/pan) */
  .canvas-container {
    position: absolute; inset: 0; overflow: hidden;
    cursor: grab;
  }
  .canvas-container:active { cursor: grabbing; }
  .stage svg { display: block; overflow: visible; user-select: none; }

  /* zoom controls */
  .zoom-controls {
    position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .zoom-btn {
    width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.15s ease;
  }
  .zoom-btn:hover { border-color: var(--muted); transform: translateY(-1px); }

  /* zones */
  .zone rect { fill: var(--zone); stroke: var(--zone-line); stroke-width: 1; stroke-dasharray: 5 5; rx: 16; }
  .zone .ztitle { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; fill: var(--muted); }
  .zone .zsub { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); opacity: 0.75; }

  /* nodes */
  .node { cursor: pointer; }
  .node rect { fill: var(--surface); stroke: var(--line); stroke-width: 1.5; rx: 10; transition: stroke .15s ease, filter .15s ease; }
  .node:hover rect { stroke: var(--muted); }
  .node.sel rect { stroke: var(--clay) !important; stroke-width: 2; }
  .node .t  { font-family: var(--sans); font-size: 14.5px; font-weight: 600; fill: var(--ink); pointer-events: none; }
  .node .m  { font-family: var(--mono); font-size: 11px; fill: var(--muted); pointer-events: none; }
  .node .k  { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; fill: var(--clay); pointer-events: none; }
  .node.gate rect { fill: var(--clay-soft); stroke: var(--clay); }
  .node.store rect { fill: var(--surface2); }
  .node.do rect { fill: var(--olive-soft); stroke: var(--olive); }
  .node.ext rect { stroke-dasharray: 6 3; }

  /* edges */
  .edge { stroke: var(--muted); stroke-width: 1.6; fill: none; marker-end: url(#a-mut); transition: opacity .2s ease, stroke .2s ease; }
  .edge.dash { stroke-dasharray: 5 4; }
  .edge.ws { stroke-width: 2; }
  .elbl { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); transition: opacity .2s ease; }

  /* flow highlighting */
  .stage.flowing .edge { opacity: 0.13; }
  .stage.flowing .elbl { opacity: 0.13; }
  .stage.flowing .node { opacity: 0.30; }
  .stage.flowing .zone { opacity: 0.45; }
  .stage.flowing .edge.lit {
    opacity: 1; stroke: var(--clay); marker-end: url(#a-clay);
    stroke-dasharray: 7 5; animation: march 0.9s linear infinite;
  }
  .stage.flowing .elbl.lit { opacity: 1; fill: var(--clay); }
  .stage.flowing .node.lit { opacity: 1; }
  .stage.flowing .node.lit rect { stroke: var(--clay); }
  @keyframes march { to { stroke-dashoffset: -12; } }
  @media (prefers-reduced-motion: reduce) { .stage.flowing .edge.lit { animation: none; } }

  .badge { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .badge circle { fill: var(--clay); }
  .badge text { fill: var(--bg); }
  .stage:not(.flowing) .badge { display: none; }

  /* ── floating cards ──────────────────────── */
  .card {
    position: absolute; max-width: 360px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  #detail { right: 16px; bottom: 16px; width: 340px; }
  #detail h3 { font-family: var(--serif); font-weight: 500; font-size: 17px; color: var(--ink); margin-bottom: 2px; }
  #detail .meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-bottom: 8px; }
  #detail p { font-size: 12.5px; line-height: 1.55; }
  #detail p code, #flowcap code { font-family: var(--mono); font-size: 11px; color: var(--clay); }
  #flowcap { left: 16px; bottom: 16px; max-width: 460px; display: none; }
  #flowcap.show { display: block; }
  #flowcap .fname { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); margin-bottom: 6px; }
  #flowcap ol { margin-left: 18px; }
  #flowcap li { font-size: 12.5px; line-height: 1.55; }
  .src { position: absolute; top: 10px; right: 16px; font-family: var(--mono); font-size: 10px; color: var(--muted); opacity: 0.8; }
  @media (max-width: 880px) {
    body { overflow: auto; }
    .stage { min-height: 70vh; }
    #detail { position: static; width: auto; margin: 10px 16px; }
    #flowcap { position: static; margin: 0 16px 16px; }
  }
</style>
</head>
<body>

<div class="bar">
  <div>
    <h1>Auth Service — Architecture</h1>
    <div class="sub">JWT AUTH · .NET 10 :5000</div>
  </div>
  <div class="spacer"></div>
  <div class="chips" id="chips">
    <button class="chip on" data-flow="all">All</button>
    <button class="chip" data-flow="register">Register Flow</button>
    <button class="chip" data-flow="login">Login Flow</button>
    <button class="chip" data-flow="me">Profile Flow</button>
  </div>
  <button id="themeToggle">☾</button>
</div>

<div class="stage" id="stage">
  <div class="canvas-container" id="canvas-container">
  <svg viewBox="0 0 1560 980" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="a-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--muted)"/>
    </marker>
    <marker id="a-clay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--clay)"/>
    </marker>
  </defs>
  <g id="viewport">

  <!-- ── zones ─────────────────────────────── -->
  <g class="zone" id="z-clients">
    <rect x="40" y="100" width="220" height="620"/>
    <text class="ztitle" x="60" y="130">Clients</text>
    <text class="zsub" x="60" y="148">Flutter · REST</text>
  </g>
  <g class="zone" id="z-auth">
    <rect x="290" y="100" width="240" height="620"/>
    <text class="ztitle" x="310" y="130">Auth API (.NET :5000)</text>
    <text class="zsub" x="310" y="148">Minimal API endpoints · JWT</text>
  </g>
  <g class="zone" id="z-middleware">
    <rect x="560" y="100" width="320" height="620"/>
    <text class="ztitle" x="580" y="130">Middleware</text>
    <text class="zsub" x="580" y="148">Security &amp; Authorization</text>
  </g>
  <g class="zone" id="z-stores">
    <rect x="910" y="100" width="220" height="620"/>
    <text class="ztitle" x="930" y="130">Data Stores</text>
    <text class="zsub" x="930" y="148">MariaDB 12.2</text>
  </g>

  <!-- ── edges ─────────────────────────────── -->
  <path class="edge" id="e-register"       d="M 240,230 C 275,230 275,230 310,230"/>
  <path class="edge" id="e-login"          d="M 240,330 C 275,330 275,280 310,280"/>
  <path class="edge" id="e-authc-token"    d="M 310,250 C 290,250 290,250 240,250"/>
  <path class="edge" id="e-authc-hasher"   d="M 410,280 L 410,320"/>
  <path class="edge" id="e-authc-jwt"      d="M 410,280 L 410,440"/>
  <path class="edge" id="e-authc-db"       d="M 510,240 C 720,240 720,240 930,240"/>
  <path class="edge" id="e-jwt-db"         d="M 510,470 C 720,470 720,280 930,280"/>
  <path class="edge" id="e-db-authc"       d="M 930,300 C 720,300 720,260 510,260"/>
  <path class="edge" id="e-jwt-middleware"  d="M 310,280 C 550,280 550,230 580,230"/>
  <path class="edge" id="e-middleware-role" d="M 720,260 L 720,320"/>
  <path class="edge" id="e-role-error"     d="M 720,380 L 720,440"/>

  <!-- edge labels -->
  <text class="elbl" data-e="e-register"   x="275" y="222">POST /auth/register</text>
  <text class="elbl" data-e="e-login"      x="275" y="315" text-anchor="end">POST /auth/login</text>
  <text class="elbl" data-e="e-authc-token" x="270" y="246">Return JWT</text>
  <text class="elbl" data-e="e-authc-hasher" x="420" y="305">hashPassword()</text>
  <text class="elbl" data-e="e-authc-jwt"  x="420" y="365">createJwt() / verify()</text>
  <text class="elbl" data-e="e-authc-db"     x="720" y="232" text-anchor="middle">Insert user</text>
  <text class="elbl" data-e="e-jwt-db"     x="720" y="380" text-anchor="middle">Read role</text>
  <text class="elbl" data-e="e-db-authc"   x="720" y="290" text-anchor="middle">User data</text>
  <text class="elbl" data-e="e-jwt-middleware" x="445" y="268">Validate token</text>
  <text class="elbl" data-e="e-middleware-role" x="730" y="305">Check role</text>
  <text class="elbl" data-e="e-role-error" x="730" y="415">403 Error</text>

  <!-- ── nodes: clients ────────────────────── -->
  <g class="node" data-k="flutter_app">
    <rect x="60" y="200" width="180" height="60"/>
    <text class="t" x="80" y="228">Flutter App</text>
    <text class="m" x="80" y="246">Mobile app · User</text>
  </g>
  <g class="node" data-k="web_client">
    <rect x="60" y="300" width="180" height="60"/>
    <text class="t" x="80" y="328">curl / Postman</text>
    <text class="m" x="80" y="346">REST API Client</text>
  </g>

  <!-- ── nodes: auth api ───────────────────── -->
  <g class="node gate" data-k="auth_ctrl">
    <rect x="310" y="200" width="200" height="80"/>
    <text class="t" x="330" y="228">Minimal API endpoints</text>
    <text class="m" x="330" y="248">POST /auth/register</text>
    <text class="m" x="330" y="262">POST /auth/login</text>
    <text class="m" x="330" y="274">GET /auth/me</text>
  </g>
  <g class="node do" data-k="password_hasher">
    <rect x="310" y="320" width="200" height="60"/>
    <text class="t" x="330" y="348">PasswordHasher</text>
    <text class="m" x="330" y="366">PBKDF2 (Identity)</text>
  </g>
  <g class="node do" data-k="jwt_handler">
    <rect x="310" y="440" width="200" height="60"/>
    <text class="t" x="330" y="468">JwtHandler</text>
    <text class="m" x="330" y="486">Create / validate JWT (2h)</text>
  </g>

  <!-- ── nodes: middleware ─────────────────── -->
  <g class="node do" data-k="jwt_middleware">
    <rect x="580" y="200" width="280" height="60"/>
    <text class="t" x="600" y="228">JWT Middleware</text>
    <text class="m" x="600" y="246">Validate Bearer token</text>
  </g>
  <g class="node do" data-k="role_checker">
    <rect x="580" y="320" width="280" height="60"/>
    <text class="t" x="600" y="348">Authorization Gate</text>
    <text class="m" x="600" y="366">Require authenticated user</text>
  </g>
  <g class="node do" data-k="error_handler">
    <rect x="580" y="440" width="280" height="60"/>
    <text class="t" x="600" y="468">HTTP Error Response</text>
    <text class="m" x="600" y="486">400 · 401 · 409</text>
  </g>

  <!-- ── nodes: data stores ────────────────── -->
  <g class="node store" data-k="mariadb">
    <rect x="930" y="200" width="180" height="90"/>
    <text class="t" x="950" y="230">MariaDB (lucy_phase5)</text>
    <text class="m" x="950" y="252">users · user_roles · roles</text>
    <text class="m" x="950" y="270">Port 3306 · UTF8MB4</text>
  </g>
  </g>
  </svg>
  </div> <!-- /canvas-container -->

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-reset">⟲</button>
    <button class="zoom-btn" id="zoom-out">-</button>
  </div>

  <div class="src">LUCY SWD392/auth-service · Auth &amp; JWT</div>

  <div class="card" id="flowcap">
    <div class="fname" id="f-name"></div>
    <ol id="f-steps"></ol>
  </div>

  <div class="card" id="detail">
    <h3 id="d-title">Click a node</h3>
    <div class="meta" id="d-meta">Node Details</div>
    <p id="d-body">Mỗi ô đều có thể click. Click các luồng phía trên để xem đường đi: Đăng ký, Đăng nhập, Lấy hồ sơ.</p>
  </div>
</div>
<script>
const DETAIL = {
  flutter_app: { t: "Flutter App", m: "Mobile App", b: "Ứng dụng di động Flutter. Gửi yêu cầu xác thực tới Auth Service (cổng 5000) để đăng ký, đăng nhập, và lấy hồ sơ người dùng." },
  web_client: { t: "curl / Postman", m: "REST Consumer", b: "Trình duyệt web, cURL, Postman — dùng để test API trong quá trình phát triển." },
  auth_ctrl: { t: "Minimal API endpoints", m: "REST Controller (.NET 10)", b: "Xử lý các route xác thực: <code>POST /auth/register</code> (đăng ký), <code>POST /auth/login</code> (cấp JWT), <code>GET /auth/me</code> (hồ sơ)." },
  password_hasher: { t: "PasswordHasher", m: "ASP.NET Core Identity", b: "Băm mật khẩu bằng PasswordHasher của ASP.NET Core Identity (PBKDF2-based) trước khi lưu vào MariaDB. Không lưu plaintext." },
  jwt_handler: { t: "JwtHandler", m: "JWT Token Manager", b: "Tạo và xác thực JWT ký bằng HMAC-SHA256. Token có thời hạn 2 giờ, chứa user ID và vai trò." },
  jwt_middleware: { t: "JWT Middleware", m: "ASP.NET Middleware", b: "Xác thực Bearer token cho endpoint được bảo vệ như <code>GET /auth/me</code>, kiểm tra issuer, audience, chữ ký và thời hạn." },
  role_checker: { t: "Authorization Gate", m: "RequireAuthorization", b: "<code>/auth/me</code> yêu cầu user đã xác thực; endpoint Auth hiện không áp role-specific policy." },
  error_handler: { t: "HTTP Error Response", m: "Minimal API", b: "Validation và authentication trả các trạng thái 400, 401 hoặc 409 tùy lỗi." },
  mariadb: { t: "MariaDB (lucy_phase5)", m: "Relational Database (Port 3306)", b: "MariaDB 12.2 lưu <code>users</code>, <code>user_roles</code>, <code>roles</code>. Được Auth Service truy cập để xác thực thông tin đăng nhập." }
};

const FLOWS = {
  register: {
    name: "Luồng Đăng Ký",
    edges: ["e-register","e-authc-hasher","e-authc-db"],
    nodes: ["flutter_app","auth_ctrl","password_hasher","mariadb"],
    steps: [
      "Người dùng gửi form đăng ký từ Flutter App với email, tên hiển thị, và mật khẩu.",
      "<code>Minimal API endpoints</code> nhận <code>POST /auth/register</code>, gọi <code>PasswordHasher</code> để băm mật khẩu.",
      "<code>PasswordHasher</code> băm mật khẩu bằng PBKDF2-based ASP.NET Core Identity với salt.",
      "<code>Minimal API endpoints</code> chèn bản ghi user mới vào MariaDB bảng <code>users</code>.",
      "JWT token được tạo cho user mới và trả về Flutter App."
    ]
  },
  login: {
    name: "Luồng Đăng Nhập",
    edges: ["e-login","e-authc-jwt","e-jwt-db","e-db-authc","e-authc-token"],
    nodes: ["web_client","auth_ctrl","jwt_handler","mariadb"],
    steps: [
      "Người dùng gửi thông tin đăng nhập qua <code>POST /auth/login</code> từ web/cURL.",
      "<code>Minimal API endpoints</code> kiểm tra email/mật khẩu với hash trong MariaDB.",
      "Thành công, <code>Minimal API endpoints</code> gọi <code>JwtHandler</code> tạo JWT đã ký.",
      "<code>JwtHandler</code> đọc vai trò user từ MariaDB bảng <code>user_roles</code>.",
      "JWT token (HMAC-SHA256, 2h) được trả về client."
    ]
  },
  me: {
    name: "Luồng Hồ Sơ",
    edges: ["e-authc-token","e-jwt-middleware","e-middleware-role"],
    nodes: ["flutter_app","auth_ctrl","jwt_middleware","role_checker"],
    steps: [
      "User đã xác thực yêu cầu <code>GET /auth/me</code> kèm Bearer JWT token.",
      "<code>JWT Middleware</code> xác thực chữ ký và thời hạn token.",
      "<code>RequireAuthorization</code> yêu cầu user đã xác thực.",
      "<code>Minimal API endpoints</code> trả về thông tin hồ sơ từ token claims."
    ]
  }
};

const stage = document.getElementById('stage');
const nodes = document.querySelectorAll('.node');
const edges = document.querySelectorAll('.edge');
const elbls = document.querySelectorAll('.elbl');
const chips = document.querySelectorAll('.chip');
const fcap = document.getElementById('flowcap');

function setFlow(key) {
  chips.forEach(c => c.classList.toggle('on', c.dataset.flow === key));
  edges.forEach(e => e.classList.remove('lit'));
  elbls.forEach(l => l.classList.remove('lit'));
  nodes.forEach(n => n.classList.remove('lit'));
  if (key === 'all') { stage.classList.remove('flowing'); fcap.classList.remove('show'); return; }
  const f = FLOWS[key];
  if (!f) return;
  stage.classList.add('flowing');
  f.edges.forEach(id => document.getElementById(id)?.classList.add('lit'));
  elbls.forEach(l => { if (f.edges.includes(l.dataset.e)) l.classList.add('lit'); });
  f.nodes.forEach(k => document.querySelector(".node[data-k='" + k + "']")?.classList.add('lit'));
  document.getElementById('f-name').textContent = f.name;
  document.getElementById('f-steps').innerHTML = f.steps.map(s => "<li>" + s + "</li>").join('');
  fcap.classList.add('show');
}
chips.forEach(c => c.addEventListener('click', () => setFlow(c.dataset.flow)));

nodes.forEach(n => n.addEventListener('click', () => {
  nodes.forEach(x => x.classList.remove('sel'));
  n.classList.add('sel');
  const d = DETAIL[n.dataset.k];
  if (!d) return;
  document.getElementById('d-title').textContent = d.t;
  document.getElementById('d-meta').textContent = d.m;
  document.getElementById('d-body').innerHTML = d.b;
}));

document.getElementById('themeToggle').addEventListener('click', () => {
  const dark = !document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark', dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
});

// Zoom and Pan Logic
let scale = 1;
let translateX = 0;
let translateY = 0;
let isDragging = false;
let startX, startY;
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport');

function updateTransform() {
  viewport.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
}

container.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.zoom-controls') || e.target.closest('.bottom-panel') || e.target.closest('.card')) return;
  isDragging = true;
  startX = e.clientX - translateX;
  startY = e.clientY - translateY;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  translateX = e.clientX - startX;
  translateY = e.clientY - startY;
  updateTransform();
});

window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mouseleave', () => { isDragging = false; });

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const scaleChange = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(Math.max(0.3, scale * scaleChange), 3);
  
  const rect = container.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  
  translateX = mouseX - (mouseX - translateX) * (newScale / scale);
  translateY = mouseY - (mouseY - translateY) * (newScale / scale);
  scale = newScale;
  
  updateTransform();
}, { passive: false });

// Auto center on load
setTimeout(() => {
  const rect = container.getBoundingClientRect();
  const svgW = 1560;
  const svgH = 980;
  scale = rect.width < svgW ? rect.width / (svgW + 100) : 1; 
  translateX = (rect.width - svgW * scale) / 2; 
  translateY = (rect.height - svgH * scale) / 2; 
  updateTransform();
}, 50);

document.getElementById('zoom-in').addEventListener('click', () => { scale = Math.min(scale * 1.2, 3); updateTransform(); });
document.getElementById('zoom-out').addEventListener('click', () => { scale = Math.max(scale * 0.8, 0.3); updateTransform(); });
document.getElementById('zoom-reset').addEventListener('click', () => { 
  const rect = container.getBoundingClientRect();
  const svgW = 1560;
  const svgH = 980;
  scale = rect.width < svgW ? rect.width / (svgW + 100) : 1; 
  translateX = (rect.width - svgW * scale) / 2; 
  translateY = (rect.height - svgH * scale) / 2; 
  updateTransform();
});
</script>
