<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Component Diagram (SOA) — LUCY SWD392: Auth, Wallet, Realtime Audio, LMS services with MariaDB. Top-down architecture view.">
<title>Component Diagram — LUCY SWD392</title>
<script>
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<style>
  :root {
    /* neutrals */
    --bg: #FAF9F5; --surface: #FFFFFF; --surface2: #F0EEE6;
    --ink: #141413; --body: #3D3D3A; --muted: #87867F;
    --line: #D1CFC5; --line-soft: #E6E3DA;
    --zone: rgba(20,20,19,0.025); --zone-line: #D1CFC5;
    /* functional */
    --clay: #D97757; --clay-soft: rgba(217,119,87,0.10);
    --olive: #788C5D; --olive-soft: rgba(120,140,93,0.12);
    --gold: #C9A45C; --gold-soft: rgba(201,164,92,0.12);
    --blue: #5B7E96; --blue-soft: rgba(91,126,150,0.12);
    /* service-specific */
    --auth: #4A7FBA; --auth-bg: rgba(74,127,186,0.10);
    --wallet: #5B9B6A; --wallet-bg: rgba(91,155,106,0.10);
    --realtime: #D48A4A; --realtime-bg: rgba(212,138,74,0.10);
    --lms: #8B6B9D; --lms-bg: rgba(139,107,157,0.10);
    --db: #B84A4A; --db-bg: rgba(184,74,74,0.08);
    /* type */
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  html.dark {
    --bg: #141413; --surface: #1F1F1D; --surface2: #2A2A28;
    --ink: #FAF9F5; --body: #D1CFC5; --muted: #87867F;
    --line: #3D3D3A; --line-soft: #2A2A28;
    --zone: rgba(250,249,245,0.03); --zone-line: #3D3D3A;
    --clay: #E48A6E; --clay-soft: rgba(228,138,110,0.14);
    --olive: #9DB07C; --olive-soft: rgba(157,176,124,0.16);
    --gold: #D4B36F; --blue: #7FA3BC; --blue-soft: rgba(127,163,188,0.16);
    --auth: #6A9FD4; --auth-bg: rgba(106,159,212,0.12);
    --wallet: #7BB88A; --wallet-bg: rgba(123,184,138,0.12);
    --realtime: #E8A862; --realtime-bg: rgba(232,168,98,0.12);
    --lms: #A88BB8; --lms-bg: rgba(168,139,184,0.12);
    --db: #D46868; --db-bg: rgba(212,104,104,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--body); font-family: var(--sans);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── top bar ─────────────────────────────── */
  .bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--line-soft); flex: none;
  }
  .bar h1 { font-family: var(--serif); font-weight: 500; font-size: 19px; color: var(--ink); letter-spacing: -0.01em; }
  .bar .sub { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .spacer { flex: 1; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s ease;
  }
  .chip:hover { color: var(--ink); border-color: var(--muted); }
  .chip.on { color: var(--ink); border-color: var(--clay); background: var(--clay-soft); }
  #themeToggle {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: transparent; color: var(--muted); cursor: pointer;
  }
  #themeToggle:hover { color: var(--ink); border-color: var(--muted); }

  /* ── stage ───────────────────────────────── */
  .stage { flex: 1; position: relative; min-height: 0; }
  .canvas-container {
    position: absolute; inset: 0; overflow: hidden;
    cursor: grab;
  }
  .canvas-container:active { cursor: grabbing; }
  .stage svg { display: block; overflow: visible; user-select: none; }

  /* ── zoom controls ───────────────────────── */
  .zoom-controls {
    position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }
  .zoom-btn {
    width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.15s ease;
  }
  .zoom-btn:hover { border-color: var(--muted); transform: translateY(-1px); }
  #zoom-level {
    font-family: var(--mono); font-size: 10px; text-align: center; color: var(--muted);
    padding: 4px 0;
  }

  /* ── SVG zones ───────────────────────────── */
  .zone-rect { fill: var(--zone); stroke: var(--zone-line); stroke-width: 1; stroke-dasharray: 5 5; rx: 16; }
  .ztitle { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; fill: var(--muted); }
  .zsub { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); opacity: 0.75; }

  /* ── SVG nodes ───────────────────────────── */
  .node { cursor: pointer; }
  .node .node-bg {
    fill: var(--surface); stroke: var(--line); stroke-width: 1.5; rx: 10;
    transition: stroke .15s ease, filter .15s ease, fill .15s ease;
  }
  .node:hover .node-bg { stroke: var(--muted); }
  .node.sel .node-bg { stroke: var(--clay) !important; stroke-width: 2; }
  .node .t  { font-family: var(--sans); font-size: 14px; font-weight: 600; fill: var(--ink); pointer-events: none; }
  .node .m  { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); pointer-events: none; }
  .node .k  { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; fill: var(--clay); pointer-events: none; }
  .node .tag {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
    fill: var(--muted); opacity: 0.7; pointer-events: none;
  }
  .node .icon text { font-size: 18px; pointer-events: none; }

  /* service-specific node tints */
  .node.auth .node-bg { fill: var(--auth-bg); stroke: var(--auth); }
  .node.auth .t { fill: var(--auth); }
  .node.auth:hover .node-bg { stroke: var(--auth); filter: brightness(1.05); }

  .node.wallet .node-bg { fill: var(--wallet-bg); stroke: var(--wallet); }
  .node.wallet .t { fill: var(--wallet); }
  .node.wallet:hover .node-bg { stroke: var(--wallet); filter: brightness(1.05); }

  .node.realtime .node-bg { fill: var(--realtime-bg); stroke: var(--realtime); }
  .node.realtime .t { fill: var(--realtime); }
  .node.realtime:hover .node-bg { stroke: var(--realtime); filter: brightness(1.05); }

  .node.lms .node-bg { fill: var(--lms-bg); stroke: var(--lms); }
  .node.lms .t { fill: var(--lms); }
  .node.lms:hover .node-bg { stroke: var(--lms); filter: brightness(1.05); }

  .node.db .node-bg { fill: var(--db-bg); stroke: var(--db); }
  .node.db .t { fill: var(--db); }
  .node.db:hover .node-bg { stroke: var(--db); filter: brightness(1.05); }

  .node.client .node-bg { fill: var(--surface); stroke: var(--line); }
  .node.client .t { fill: var(--ink); }
  .node.client:hover .node-bg { stroke: var(--muted); }

  /* ── SVG edges ───────────────────────────── */
  .edge { stroke: var(--muted); stroke-width: 1.6; fill: none; marker-end: url(#a-mut); transition: opacity .2s ease, stroke .2s ease; }
  .edge.dash { stroke-dasharray: 5 4; stroke-width: 1.4; }
  .edge.ws { stroke-width: 2; }
  .elbl { font-family: var(--mono); font-size: 10px; fill: var(--muted); transition: opacity .2s ease; paint-order: stroke; stroke: var(--bg); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── flow animation ──────────────────────── */
  .stage.flowing .edge { opacity: 0.13; }
  .stage.flowing .elbl { opacity: 0.13; }
  .stage.flowing .node .node-bg { opacity: 0.40; }
  .stage.flowing .node .t, .stage.flowing .node .m, .stage.flowing .node .k, .stage.flowing .node .tag, .stage.flowing .node .icon { opacity: 0.40; }
  .stage.flowing .zone-rect { opacity: 0.45; }
  .stage.flowing .ztitle, .stage.flowing .zsub { opacity: 0.45; }
  .stage.flowing .edge.lit {
    opacity: 1; stroke: var(--clay); marker-end: url(#a-clay);
    stroke-dasharray: 7 5; animation: march 0.9s linear infinite;
  }
  .stage.flowing .elbl.lit { opacity: 1; fill: var(--clay); stroke: var(--bg); }
  .stage.flowing .node.lit .node-bg { opacity: 1; }
  .stage.flowing .node.lit .t, .stage.flowing .node.lit .m,
  .stage.flowing .node.lit .k, .stage.flowing .node.lit .tag,
  .stage.flowing .node.lit .icon { opacity: 1; }
  .stage.flowing .node.lit .node-bg { stroke: var(--clay); }
  @keyframes march { to { stroke-dashoffset: -12; } }
  @media (prefers-reduced-motion: reduce) { .stage.flowing .edge.lit { animation: none; } }

  /* ── floating cards ──────────────────────── */
  .fcard {
    position: absolute;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; box-shadow: 0 6px 24px rgba(0,0,0,0.08); z-index: 20;
    max-width: 380px;
  }
  .fcard .close-btn {
    position: absolute; top: 8px; right: 10px;
    font-family: var(--sans); font-size: 16px; line-height: 1;
    background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 5px;
    border-radius: 4px; transition: all .15s ease;
  }
  .fcard .close-btn:hover { color: var(--ink); background: var(--surface2); }

  #detail {
    right: 16px; bottom: 16px; width: 360px; z-index: 21;
  }
  #detail h3 { font-family: var(--serif); font-weight: 500; font-size: 17px; color: var(--ink); margin-bottom: 2px; padding-right: 24px; }
  #detail .meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-bottom: 8px; }
  #detail p { font-size: 12.5px; line-height: 1.55; }
  #detail p code { font-family: var(--mono); font-size: 11px; color: var(--clay); }

  #flowcap {
    left: 16px; bottom: 16px; max-width: 460px; display: none; z-index: 22;
  }
  #flowcap.show { display: block; }
  #flowcap .fname { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); margin-bottom: 6px; padding-right: 24px; }
  #flowcap ol { margin-left: 18px; }
  #flowcap li { font-size: 12.5px; line-height: 1.55; }
  #flowcap .close-btn { top: 6px; right: 8px; }

  .src {
    position: absolute; top: 10px; right: 16px; font-family: var(--mono); font-size: 10px; color: var(--muted); opacity: 0.8; z-index: 5;
  }

  @media (max-width: 880px) {
    body { overflow: auto; }
    .stage { min-height: 80vh; display: flex; flex-direction: column; }
    .canvas-container { position: relative; min-height: 80vh; }
    #detail { position: static; width: auto; margin: 10px 16px; }
    #flowcap { position: static; margin: 0 16px 16px; }
    .zoom-controls { display: none; }
  }
</style>
</head>
<body>

<div class="bar">
  <div>
    <h1>Component Diagram — SOA</h1>
    <div class="sub">LUCY SWD392 · 4 SERVICES</div>
  </div>
  <div class="spacer"></div>
  <div class="chips" id="chips">
    <button class="chip on" data-flow="all">All</button>
    <button class="chip" data-flow="auth">Auth</button>
    <button class="chip" data-flow="wallet">Wallet</button>
    <button class="chip" data-flow="realtime">Realtime</button>
    <button class="chip" data-flow="lms">LMS</button>
    <button class="chip" data-flow="inter">Inter-Service</button>
  </div>
  <button id="themeToggle">☾</button>
</div>

<div class="stage" id="stage">
  <div class="canvas-container" id="canvas-container">
  <svg viewBox="0 0 1500 1250" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="a-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--muted)"/>

    </marker>
    <marker id="a-auth" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">

    </marker>
    <marker id="a-wallet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">

    </marker>
    <marker id="a-realtime" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">

    </marker>
    <marker id="a-lms" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--lms)"/>
    </marker>
    <marker id="a-db" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill: var(--db)"/>
    </marker>
  </defs>
  <g id="viewport">

  <!-- ── zones ─────────────────────────────── -->
  <rect class="zone-rect" x="60" y="80" width="1380" height="260"/>

  <!-- ── edges: Client → Services ──────────── -->

  <!-- Flutter (290) → Auth (200) -->

  <!-- curl (970) → Wallet (520) -->
  <path class="edge" id="e-curl-wallet" d="M 970,240 L 970,330 L 520,330 L 520,480"/>
  <!-- curl (970) → Realtime (840) -->

  <!-- ── edges: Service → MariaDB ──────────── -->
  <path class="edge" id="e-auth-db" d="M 200,610 L 200,1000"/>
  <path class="edge" id="e-wallet-db" d="M 520,610 L 520,1000"/>
  <path class="edge" id="e-realtime-db" d="M 840,610 L 840,1000"/>

  <!-- ── edges: Inter-service (dashed) ─────── -->
  <path class="edge dash" id="e-wallet-realtime" d="M 660,545 L 720,545"/>
  <path class="edge dash" id="e-wallet-auth" d="M 380,560 L 340,560"/>

  <!-- ── edge labels ───────────────────────── -->
  <text class="elbl" data-e="e-flutter-auth" x="245" y="322" text-anchor="end">REST (JWT auth)</text>
  <text class="elbl" data-e="e-flutter-wallet" x="410" y="402" text-anchor="middle">REST (wallet ops)</text>
  <text class="elbl" data-e="e-curl-wallet" x="750" y="322" text-anchor="start">HTTP (Swagger/API)</text>
  <text class="elbl" data-e="e-curl-realtime" x="900" y="402" text-anchor="middle">WebSocket (audio events)</text>

  <text class="elbl" data-e="e-auth-db" x="200" y="800" text-anchor="end" transform="rotate(-90,200,800)">users · roles</text>
  <text class="elbl" data-e="e-wallet-db" x="520" y="800" text-anchor="end" transform="rotate(-90,520,800)">transactions · balance</text>

  <text class="elbl" data-e="e-wallet-realtime" x="690" y="537" text-anchor="middle">client announce after commit</text>
  <text class="elbl" data-e="e-wallet-auth" x="360" y="552" text-anchor="middle">validate JWT</text>

  <!-- ── nodes: Clients ────────────────────── -->
  <g class="node client" data-k="flutter_app">
    <rect class="node-bg" x="130" y="160" width="320" height="80"/>

<script>
const DETAIL = {
  flutter_app: {

/* ── DOM refs ─────────────────────────── */
const stage = document.getElementById('stage');
const nodes = document.querySelectorAll('.node');
const edges = document.querySelectorAll('.edge');
const elbls = document.querySelectorAll('.elbl');
const chips = document.querySelectorAll('.chip');
const fcap = document.getElementById('flowcap');
const fcapSteps = document.getElementById('f-steps');
const fcapName = document.getElementById('f-name');
const detailCard = document.getElementById('detail');
const dTitle = document.getElementById('d-title');
const dMeta = document.getElementById('d-meta');
const dBody = document.getElementById('d-body');

/* ── flow chip logic ──────────────────── */
function setFlow(key) {
  chips.forEach(c => { c.classList.toggle('on', c.dataset.flow === key); });
  edges.forEach(e => { e.classList.remove('lit'); });
  elbls.forEach(l => { l.classList.remove('lit'); });
  nodes.forEach(n => { n.classList.remove('lit'); });
  if (key === 'all') {
    stage.classList.remove('flowing');
    fcap.classList.remove('show');
    return;
  }
  const f = FLOWS[key];
  if (!f) return;
  stage.classList.add('flowing');
  f.edges.forEach(id => { document.getElementById(id)?.classList.add('lit'); });
  elbls.forEach(l => { if (f.edges.includes(l.dataset.e)) l.classList.add('lit'); });
  f.nodes.forEach(k => { document.querySelector(`.node[data-k='${k}']`)?.classList.add('lit'); });
  fcapName.textContent = f.name;
  fcapSteps.innerHTML = f.steps.map(s => `<li>${s}</li>`).join('');
  fcap.classList.add('show');
}
chips.forEach(c => { c.addEventListener('click', () => setFlow(c.dataset.flow)); });

/* ── node click ───────────────────────── */
let dragMoved = false;
let dragStartX = 0, dragStartY = 0;

nodes.forEach(n => {
  n.addEventListener('mousedown', (e) => {
    dragMoved = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
  });
  n.addEventListener('mousemove', (e) => {
    if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) {
      dragMoved = true;
    }
  });
  n.addEventListener('click', () => {
    if (dragMoved) return;
    nodes.forEach(x => { x.classList.remove('sel'); });
    n.classList.add('sel');
    const d = DETAIL[n.dataset.k];
    if (!d) return;
    dTitle.textContent = d.t;
    dMeta.textContent = d.m;
    dBody.innerHTML = d.b;
    detailCard.style.display = 'block';
  });
});

/* ── card close buttons ───────────────── */
document.getElementById('dt-close').addEventListener('click', (e) => {
  e.stopPropagation();
  detailCard.style.display = 'none';
  nodes.forEach(x => { x.classList.remove('sel'); });
});
document.getElementById('fc-close').addEventListener('click', (e) => {
  e.stopPropagation();
  fcap.classList.remove('show');
  setFlow('all');
});

/* ── theme toggle ─────────────────────── */
document.getElementById('themeToggle').addEventListener('click', () => {
  const dark = !document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark', dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
});

/* ── zoom & pan ───────────────────────── */
let scale = 1;
let translateX = 0;
let translateY = 0;
let isDragging = false;
let panStartX, panStartY;
let dragStartPanX, dragStartPanY;
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport');
const zoomLevel = document.getElementById('zoom-level');

function updateTransform() {
  viewport.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
  zoomLevel.textContent = `${Math.round(scale * 100)}%`;
}

container.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.zoom-controls') || e.target.closest('.fcard')) return;
  isDragging = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  dragStartPanX = translateX;
  dragStartPanY = translateY;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - panStartX;
  const dy = e.clientY - panStartY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
    dragMoved = true;
  }
  translateX = dragStartPanX + dx;
  translateY = dragStartPanY + dy;
  updateTransform();
});

window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mouseleave', () => { isDragging = false; });

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const scaleChange = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(Math.max(0.25, scale * scaleChange), 4);

  // Zoom at cursor: keep the SVG point under cursor fixed
  translateX = mouseX - (mouseX - translateX) * (newScale / scale);
  translateY = mouseY - (mouseY - translateY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, { passive: false });

document.getElementById('zoom-in').addEventListener('click', () => {
  scale = Math.min(scale * 1.25, 4);
  updateTransform();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  scale = Math.max(scale * 0.8, 0.25);
  updateTransform();
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  autoCenter();
});

function autoCenter() {
  const rect = container.getBoundingClientRect();
  const svgW = 1500;
  const svgH = 1250;
  const pad = 60;
  const availW = rect.width - pad * 2;
  const availH = rect.height - pad * 2;
  scale = Math.min(availW / svgW, availH / svgH, 1.4);
  scale = Math.max(scale, 0.25);
  translateX = (rect.width - svgW * scale) / 2;
  translateY = (rect.height - svgH * scale) / 2;
  updateTransform();
}

setTimeout(autoCenter, 80);
window.addEventListener('resize', autoCenter);
</script>
